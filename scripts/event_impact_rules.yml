- event: "美伊/中東衝突"
  keywords: 
    - "iran"
    - "war"
    - "conflict"
    - "military"
    - "attack"
    - "missile"
    - "伊朗"
    - "戰爭"
    - "衝突"
    - "軍事"
    - "攻擊"
    - "飛彈"
    - "中東"
  impact:
    direction: "bullish" # 對特定板塊為利多
    description: "中東地區的軍事衝突通常會刺激全球的國防、石油和黃金市場。"
    sectors: ["defense", "shipping", "oil", "gold"]
    stocks:
      defense: # 國防/軍工股
        - "8033"  # 漢翔
        - "2634"  # 亞航
        - "4556"  # 精剛
      shipping: # 航運股 (因紅海等區域不穩)
        - "2603"  # 長榮
        - "2609"  # 陽明
      oil: # 石油/塑化股
        - "1301"  # 台塑
        - "1303"  # 南亞
      gold: # 黃金相關ETF
        - "00635U" # 期元大S&P黃金

- event: "美國對中半導體禁令"
  keywords:
    - "chip ban"
    - "semiconductor restriction"
    - "export control"
    - "entity list"
    - "禁令"
    - "制裁"
    - "晶片法案"
    - "實體清單"
  impact:
    direction: "mixed" # 影響複雜
    description: "對美國技術依賴度高的中國供應鏈公司可能受創，但台灣的轉單或去美化供應鏈可能受益。"
    sectors: ["foundry", "ic_design"]
    stocks:
      impacted_positive: # 可能有轉單效益
        - "2330" # 台積電
        - "2303" # 聯電
      impacted_negative: # 中國業務佔比較高或供應鏈相關
        - "3711" # 日月光投控
        - "2454" # 聯發科 (需觀察高階晶片市場反應)

- event: "Trump全球關稅政策衝擊出口"
  keywords:
    - "tariff"
    - "tariffs"
    - "關稅"
    - "trade war"
    - "Trump trade"
    - "export"
    - "出口"
    - "貿易戰"
  impact:
    direction: "bearish"
    description: "台灣EMS與ODM廠以美國為主要終端市場，關稅提高壓縮品牌客戶訂單與代工利潤。"
    sectors: ["EMS", "ODM", "electronics"]
    stocks:
      EMS:
        - "2317" # 鴻海
        - "4938" # 和碩
        - "3231" # 緯創
      ODM:
        - "2382" # 廣達
        - "3008" # 正成
      electronics:
        - "2357" # 華碩

- event: "美國東南亞貿易協商停滯"
  keywords:
    - "Southeast Asia"
    - "trade deal"
    - "Vietnam"
    - "東南亞"
    - "供應鏈轉移"
    - "關稅豁免"
    - "越南"
  impact:
    direction: "bearish"
    description: "台廠赴東南亞設廠以規避關稅的策略效益下降，供應鏈重組進程受阻。"
    sectors: ["EMS", "PCB"]
    stocks:
      EMS:
        - "2317" # 鴻海
      PCB:
        - "3034" # 聯詳
